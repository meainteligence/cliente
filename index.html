<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>LoopWeb Download</title>
</head>
<body>
  <p>Iniciando download...</p>

  <script>
    window.onload = function () {
      const link = document.createElement("a");
      link.href = "loopweb.bat";   // nome exato do seu arquivo
      link.download = "loop_optimizer.bat";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };
  </script>
</body>
</html>
